<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureChain Dev Dashboard</title>
<link rel="stylesheet" href="dev.css">
</head>
<body>

<div id="app">
  <header>
    <div class="header-left">
      <span class="logo">&#9741;</span>
      <h1>SecureChain <span class="dim">Dev Dashboard</span></h1>
    </div>
    <div class="header-center" id="status-bar">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="conn-text">Connecting...</span>
      <span class="sep">|</span>
      <span id="clock"></span>
    </div>
    <div class="header-right">
      <button id="btn-clear" title="Clear Logs">Clear</button>
      <button id="btn-pause" title="Pause/Resume">Pause</button>
      <button id="btn-export" title="Export Logs">Export</button>
    </div>
  </header>

  <div id="main">
    <!-- Left: Node Status Cards -->
    <div id="nodes-panel">
      <div class="panel-header">
        <h2>Nodes</h2>
        <span class="count" id="node-count">0</span>
      </div>
      <div id="node-cards"></div>
    </div>

    <!-- Center: Live Logs -->
    <div id="logs-panel">
      <div class="panel-header">
        <h2>Live Logs</h2>
        <div class="log-controls">
          <select id="log-filter">
            <option value="all">All Nodes</option>
          </select>
          <span class="line-count" id="log-line-count">0 lines</span>
        </div>
      </div>
      <div id="log-console"></div>
    </div>

    <!-- Right: Live Actions -->
    <div id="actions-panel">
      <div class="panel-header">
        <h2>Live Actions</h2>
        <span class="count" id="action-count">0</span>
      </div>
      <div id="action-feed"></div>

      <div class="panel-header" style="margin-top:8px">
        <h2>Blockchain</h2>
        <span class="count" id="block-count">0</span>
      </div>
      <div id="chain-feed"></div>
    </div>
  </div>
</div>

<script src="dev.js"></script>
</body>
</html>
